plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

android {
    // 🛡️ BLINDAJE: Namespace único para evitar conflictos en el Play Store
    namespace "com.barriovigilado.barriouroseguro"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        // 🛡️ BLINDAJE: Forzamos Java 17 para que Firebase no tire error de compatibilidad
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.barriovigilado.barriouroseguro"
        
        // 🛡️ BLINDAJE: Subimos a 23 para evitar errores con permisos modernos y librerías de Google
        minSdkVersion 23 
        
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        
        // 🛡️ BLINDAJE: Esto evita que la app "explote" si agregás muchas librerías (Firebase, Maps, etc)
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            // 🛡️ BLINDAJE: Optimización de código (opcional, pero ayuda a que la app sea más liviana)
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // 🛡️ BLINDAJE: Versión estable de MultiDex
    implementation 'androidx.multidex:multidex:2.0.1'
}

// 🛡️ BLINDAJE: Doble verificación para los servicios de Google
apply plugin: 'com.google.gms.google-services'